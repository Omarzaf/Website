name: Static site

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          git ls-files '*.js' '*.cjs' | sort | while IFS= read -r file; do
            node --check "$file"
          done

      - name: Run tests
        run: |
          for test_file in tests/*.test.cjs; do
            node "$test_file"
          done

      - name: Build publishable site
        run: node tools/build-public-site.cjs

      - name: Verify publish surface
        run: node tools/check-static-site.cjs

      - name: Upload public build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site-dist
          path: dist
